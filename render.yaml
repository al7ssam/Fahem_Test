# Root للمستودع يجب أن يكون مجلد يحتوي package.json (لا تضبط Root Directory في لوحة Render
# على مجلد فرعي ما لم يكن المشروع هناك).
#
# NODE_ENV=production يجعل npm يتخطى devDependencies أثناء التثبيت فيعجز البناء عن
# العثور على vite/tsc (exit 127). نثبت devDependencies صراحةً ثم نبني.
services:
  - type: web
    name: fahem
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run db:migrate && node dist/server/index.js
    healthCheckPath: /health
    envVars:
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
