<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Inspection Dashboard</title>
    <style>
      :root {
        --bg: #070b16;
        --card: #11182b;
        --line: rgba(223, 187, 106, 0.24);
        --text: #f4e4bf;
        --muted: #c5b48f;
        --accent: #dfbb6a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at top, #1a2341 0%, var(--bg) 58%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      }
      .wrap {
        max-width: 1150px;
        margin: 0 auto;
        padding: 1rem;
      }
      .card {
        background: linear-gradient(to bottom, #10172a, #0e1425);
        border: 1px solid var(--line);
        border-radius: 0.9rem;
        padding: 0.85rem;
        margin-bottom: 0.8rem;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 12rem auto auto;
        gap: 0.6rem;
        align-items: end;
      }
      @media (max-width: 880px) {
        .toolbar { grid-template-columns: 1fr; }
      }
      label { display: block; margin-bottom: 0.25rem; color: var(--muted); }
      input, button {
        width: 100%;
        background: #0b1222;
        border: 1px solid rgba(223, 187, 106, 0.28);
        color: var(--text);
        border-radius: 0.65rem;
        padding: 0.55rem 0.7rem;
      }
      button { cursor: pointer; font-weight: 700; }
      button:hover { border-color: rgba(223, 187, 106, 0.55); }
      .meta {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.6rem;
      }
      @media (max-width: 880px) {
        .meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .kv { padding: 0.5rem; border: 1px solid rgba(223, 187, 106, 0.18); border-radius: 0.65rem; }
      .kv b { color: var(--accent); }
      .flow {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .layer-title {
        margin: 0 0 0.45rem;
        color: var(--accent);
        font-weight: 800;
      }
      .section-title {
        margin: 0.5rem 0 0.25rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
      pre.code {
        direction: ltr;
        text-align: left;
        background: #060b16;
        border: 1px solid rgba(223, 187, 106, 0.18);
        border-radius: 0.6rem;
        padding: 0.65rem;
        overflow: auto;
        max-height: 22rem;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.35;
        font-size: 0.82rem;
      }
      .json-key { color: #f7c96f; }
      .json-string { color: #a6e3a1; }
      .json-number { color: #89dceb; }
      .json-bool { color: #f38ba8; }
      .json-null { color: #cba6f7; }
      .msg { margin-top: 0.45rem; min-height: 1.2rem; }
      .muted { color: var(--muted); }
      .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
      .preview-shell {
        margin-top: 0.7rem;
        border: 1px solid rgba(223, 187, 106, 0.2);
        border-radius: 0.8rem;
        padding: 0.75rem;
        background: rgba(8, 12, 24, 0.86);
      }
      .preview-phone {
        border: 1px solid rgba(223, 187, 106, 0.2);
        border-radius: 0.75rem;
        background: rgba(25, 31, 57, 0.82);
        padding: 0.7rem;
      }
      .preview-meta {
        display: flex;
        justify-content: space-between;
        color: #dbc89f;
        margin-bottom: 0.45rem;
        font-size: 0.84rem;
      }
      .preview-prompt { font-size: 1rem; font-weight: 700; margin-bottom: 0.55rem; }
      .preview-options { display: grid; grid-template-columns: 1fr; gap: 0.45rem; margin-bottom: 0.6rem; }
      .preview-options.two-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .preview-option { border: 1px solid rgba(223, 187, 106, 0.23); border-radius: 0.6rem; padding: 0.48rem; background: rgba(17, 24, 39, 0.85); }
      .preview-option.correct { border-color: rgba(52, 211, 153, 0.75); background: rgba(6, 78, 59, 0.35); }
      .preview-study { border: 1px solid rgba(223, 187, 106, 0.18); border-radius: 0.6rem; padding: 0.58rem; background: rgba(10, 14, 27, 0.85); }
      .preview-empty { color: #c9ba97; text-align: center; font-size: 0.9rem; padding: 1.1rem 0.3rem; }
      .error-timeline-list {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.45rem;
      }
      .error-item {
        border: 1px solid rgba(248, 113, 113, 0.35);
        background: rgba(127, 29, 29, 0.2);
        border-radius: 0.6rem;
        padding: 0.55rem;
      }
      .error-item b { color: #fca5a5; }
      .error-details {
        margin-top: 0.35rem;
        font-size: 0.82rem;
        white-space: pre-wrap;
        color: #f9d9d9;
      }
      .eff-section {
        background: linear-gradient(160deg, rgba(20, 28, 48, 0.98), rgba(10, 14, 26, 0.98));
        border: 1px solid rgba(223, 187, 106, 0.38);
        border-radius: 1rem;
        padding: 0;
        margin-bottom: 1rem;
        box-shadow: 0 0 0 1px rgba(223, 187, 106, 0.08);
      }
      .eff-section-inner {
        padding: 1rem 1.05rem 1.1rem;
      }
      .eff-section-head {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.65rem;
        margin-bottom: 0.85rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid rgba(223, 187, 106, 0.22);
      }
      .eff-section-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--accent);
        letter-spacing: 0.02em;
      }
      .eff-section-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }
      button.eff-action-btn {
        width: auto;
        padding: 0.42rem 0.8rem;
        font-size: 0.8rem;
      }
      .eff-section-body {
        min-height: 2rem;
      }
      .eff-meta-bar {
        font-size: 0.8rem;
        color: var(--muted);
        line-height: 1.55;
        margin-bottom: 0.85rem;
        padding: 0.55rem 0.65rem;
        background: rgba(6, 10, 20, 0.55);
        border-radius: 0.65rem;
        border: 1px solid rgba(223, 187, 106, 0.14);
      }
      .eff-meta-bar code {
        font-size: 0.74rem;
        word-break: break-all;
      }
      .eff-kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.55rem;
        margin-bottom: 0.9rem;
      }
      @media (max-width: 900px) {
        .eff-kpi-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .eff-kpi-card {
        padding: 0.55rem 0.6rem;
        border-radius: 0.65rem;
        border: 1px solid rgba(223, 187, 106, 0.2);
        background: rgba(8, 12, 24, 0.72);
        text-align: center;
      }
      .eff-kpi-card b {
        display: block;
        font-size: 1.05rem;
        color: var(--accent);
        margin-bottom: 0.2rem;
      }
      .eff-kpi-card span {
        font-size: 0.75rem;
        color: var(--muted);
      }
      .eff-alert {
        margin-bottom: 0.75rem;
        padding: 0.55rem 0.65rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(251, 191, 36, 0.45);
        background: rgba(120, 90, 20, 0.18);
        color: #fde68a;
        font-size: 0.84rem;
      }
      .eff-block-title {
        margin: 0.85rem 0 0.4rem;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--accent);
      }
      .eff-block-title:first-of-type {
        margin-top: 0.25rem;
      }
      .eff-summary {
        font-size: 0.88rem;
        opacity: 0.92;
        margin-bottom: 0.45rem;
      }
      .eff-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.84rem;
        margin-bottom: 0.5rem;
        direction: ltr;
        text-align: center;
      }
      .eff-table th,
      .eff-table td {
        border: 1px solid rgba(223, 187, 106, 0.22);
        padding: 0.38rem 0.28rem;
      }
      .eff-table th:first-child,
      .eff-table td:first-child {
        text-align: right;
        direction: rtl;
      }
      .eff-table.eff-subtable th:first-child,
      .eff-table.eff-subtable td:first-child {
        text-align: left;
        direction: ltr;
      }
      .eff-table tbody tr.eff-totals-row td {
        font-weight: 800;
        border-top: 1px solid rgba(223, 187, 106, 0.32);
      }
      .eff-calls-scroll {
        max-height: 20rem;
        overflow: auto;
        border-radius: 0.6rem;
        border: 1px solid rgba(223, 187, 106, 0.16);
      }
      .eff-calls-scroll .eff-table {
        margin-bottom: 0;
      }
      .eff-notes {
        margin: 0.35rem 0 0;
        padding-right: 1.1rem;
        font-size: 0.82rem;
        color: var(--muted);
        line-height: 1.5;
      }
      .eff-details {
        margin-top: 0.75rem;
        border: 1px solid rgba(223, 187, 106, 0.18);
        border-radius: 0.65rem;
        padding: 0.5rem 0.65rem;
        background: rgba(6, 10, 20, 0.45);
      }
      .eff-details summary {
        cursor: pointer;
        font-weight: 700;
        color: var(--accent);
      }
      .eff-json-pre {
        max-height: 16rem;
        margin-top: 0.5rem;
        margin-bottom: 0;
      }
      .eff-foot {
        font-size: 0.78rem;
        opacity: 0.78;
        line-height: 1.45;
        margin-top: 0.35rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 style="margin:0 0 0.45rem">AI Inspection Dashboard</h2>
        <div class="muted">إجمالي الأسئلة: {{QUESTION_COUNT}}</div>
      </div>

      <div class="card toolbar">
        <div>
          <label for="admin-secret">Admin Secret</label>
          <input id="admin-secret" type="password" placeholder="أدخل مفتاح الأدمن" />
        </div>
        <div>
          <label for="job-id">Job ID</label>
          <input id="job-id" type="number" min="1" placeholder="مثال: 12" />
        </div>
        <div>
          <button id="load-btn" type="button">تحميل الفحص</button>
        </div>
        <div>
          <button id="back-btn" type="button">العودة للأدمن</button>
        </div>
      </div>

      <div class="card">
        <div id="job-meta" class="meta"></div>
        <div id="msg" class="msg"></div>
      </div>

      <div id="flow" class="flow"></div>

      <section id="efficiency-section" class="eff-section" hidden aria-labelledby="efficiency-heading">
        <div class="eff-section-inner">
          <header class="eff-section-head">
            <h2 id="efficiency-heading" class="eff-section-title">تقرير كفاءة الاستهلاك</h2>
            <div class="eff-section-actions">
              <button type="button" class="eff-action-btn" data-inspection-eff-json-copy>نسخ JSON</button>
              <button type="button" class="eff-action-btn" data-eff-scroll-to-flow>الانتقال لتفاصيل الطبقات</button>
            </div>
          </header>
          <div id="efficiency-section-inner" class="eff-section-body muted"></div>
        </div>
      </section>

      <div class="card">
        <h3 class="layer-title" style="margin-bottom:0.35rem">تسلسل الأخطاء</h3>
        <div class="muted" id="errors-meta">لا توجد أخطاء.</div>
        <div id="errors-timeline" class="error-timeline-list"></div>
      </div>

      <div class="card">
        <h3 class="layer-title" style="margin-bottom:0.35rem">المخرج النهائي (Normalized JSON)</h3>
        <div class="muted" id="final-output-meta">لا يوجد مخرج نهائي بعد.</div>
        <div class="btn-row">
          <button id="preview-final-btn" type="button" disabled>عرض الأسئلة</button>
        </div>
        <div style="margin-top:0.55rem">
          <pre id="final-output-json" class="code"></pre>
        </div>

        <div class="preview-shell" id="final-preview-shell" hidden>
          <div class="preview-phone" id="final-preview-phone">
            <div class="preview-empty">لا توجد بيانات للمعاينة.</div>
          </div>
          <div class="btn-row">
            <button type="button" id="final-prev-btn">السابق</button>
            <button type="button" id="final-next-btn">التالي</button>
            <button type="button" id="final-close-btn">إغلاق المعاينة</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var finalItems = [];
        var finalIndex = 0;
        function esc(s) {
          return String(s ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }
        function syntaxHighlightJson(text) {
          try {
            var obj = JSON.parse(String(text || ""));
            var pretty = JSON.stringify(obj, null, 2);
            var html = esc(pretty)
              .replace(/\"([^\"\\]*(?:\\.[^\"\\]*)*)\"(?=\\s*:)/g, '<span class="json-key">"$1"</span>')
              .replace(/\"([^\"\\]*(?:\\.[^\"\\]*)*)\"/g, '<span class="json-string">"$1"</span>')
              .replace(/\b-?\d+(?:\.\d+)?\b/g, '<span class="json-number">$&</span>')
              .replace(/\b(true|false)\b/g, '<span class="json-bool">$1</span>')
              .replace(/\bnull\b/g, '<span class="json-null">null</span>');
            return { html: html, isJson: true };
          } catch {
            return { html: esc(String(text || "")), isJson: false };
          }
        }
        function renderMeta(job) {
          var box = document.getElementById("job-meta");
          box.innerHTML = "";
          var fields = [
            ["Job", "#" + job.id],
            ["الحالة", job.status],
            ["الطبقة الحالية", job.currentLayer || "-"],
            ["subcategory", job.subcategoryKey],
            ["محاولات", String(job.attemptCount) + " / " + String(job.maxAttempts)],
            ["created", job.createdAt || "-"],
            ["started", job.startedAt || "-"],
            ["finished", job.finishedAt || "-"],
            ["lastError", job.lastError || "-"],
            ["difficulty", job.difficultyMode || "-"],
          ];
          fields.forEach(function (f) {
            var el = document.createElement("div");
            el.className = "kv";
            el.innerHTML = "<b>" + esc(f[0]) + ":</b> " + esc(f[1]);
            box.appendChild(el);
          });
        }
        function renderFlow(items) {
          var flow = document.getElementById("flow");
          flow.innerHTML = "";
          if (!items || !items.length) {
            flow.innerHTML = '<div class="card muted">لا توجد بيانات inspection لهذا الـ job بعد.</div>';
            return;
          }
          items.forEach(function (row, idx) {
            var card = document.createElement("div");
            card.className = "card";
            var p = syntaxHighlightJson(row.promptText || "");
            var r = syntaxHighlightJson(row.rawResponseText || "");
            card.innerHTML =
              '<h3 class="layer-title">[' + esc(String(idx + 1)) + "] " + esc(row.layerName || "-") + "</h3>" +
              '<div class="muted">model: ' + esc(row.modelName || "-") + " | provider: " + esc(row.provider || "-") + " | api: " + esc(row.apiVersion || "-") + " | at: " + esc(row.createdAt || "-") + "</div>" +
              '<div class="section-title">Prompt</div>' +
              '<pre class="code">' + p.html + "</pre>" +
              '<div class="section-title">Raw Response' + (r.isJson ? " (JSON)" : "") + "</div>" +
              '<pre class="code">' + r.html + "</pre>";
            flow.appendChild(card);
          });
        }
        function renderErrorsTimeline(items) {
          var meta = document.getElementById("errors-meta");
          var box = document.getElementById("errors-timeline");
          box.innerHTML = "";
          if (!items || !items.length) {
            meta.textContent = "لا توجد أخطاء لهذا الـjob.";
            return;
          }
          meta.textContent = "عدد الأخطاء: " + String(items.length) + " (مرتبة زمنيًا).";
          items.forEach(function (e, idx) {
            var row = document.createElement("div");
            row.className = "error-item";
            var detailsText = "";
            if (e.details && typeof e.details === "object" && e.details.error) {
              detailsText = String(e.details.error);
            } else if (e.details) {
              detailsText = JSON.stringify(e.details);
            }
            row.innerHTML =
              "<div><b>#" + String(idx + 1) + "</b> | " + esc(e.createdAt || "-") + " | layer: " + esc(e.layerName || "-") + "</div>" +
              "<div style='margin-top:0.25rem'>" + esc(e.message || "-") + "</div>" +
              (detailsText ? "<div class='error-details'>" + esc(detailsText) + "</div>" : "");
            box.appendChild(row);
          });
        }
        function effFmtCost(n) {
          var x = Number(n);
          if (!Number.isFinite(x)) return "0";
          return x.toFixed(6);
        }
        function renderEfficiencyReport(effRes, effJson) {
          var inner = document.getElementById("efficiency-section-inner");
          if (!effRes.ok || !effJson.ok || !effJson.report) {
            window.__afInspectionEfficiencyReport = null;
            inner.innerHTML =
              '<p class="muted" style="margin:0">تعذر تحميل تقرير الكفاءة لهذا الـ job.</p>';
            return;
          }
          var rep = effJson.report;
          window.__afInspectionEfficiencyReport = rep;
          var t = rep.totals || {};
          var dom = (rep.indicators && rep.indicators.dominantLayerByTotal) || "—";
          var thShare =
            rep.indicators && rep.indicators.thoughtsShareOfTotal != null
              ? Math.round(rep.indicators.thoughtsShareOfTotal * 100) + "%"
              : "—";
          var callsArr = Array.isArray(rep.calls) ? rep.calls : [];
          var miss = Array.isArray(rep.missingLayers) ? rep.missingLayers : [];
          var missHtml = miss.length
            ? '<div class="eff-alert" role="alert">طبقات بلا سجلات فحص لهذا الـ job: ' +
              miss.map(function (x) { return esc(String(x)); }).join("، ") +
              "</div>"
            : "";
          var layerRows = "";
          ["architect", "creator", "auditor", "refiner"].forEach(function (layer) {
            var b = rep.byLayer && rep.byLayer[layer];
            var pct =
              (rep.indicators &&
                rep.indicators.layerShareOfTotalTokensPercent &&
                rep.indicators.layerShareOfTotalTokensPercent[layer]) ||
              0;
            if (!b || b.callCount === 0) {
              layerRows +=
                "<tr><td>" +
                esc(layer) +
                "</td><td colspan=\"5\" style=\"opacity:0.72\">— لا يوجد استدعاء مسجل</td></tr>";
            } else {
              layerRows +=
                "<tr><td>" +
                esc(layer) +
                "</td><td>" +
                esc(String(b.promptTokenCount)) +
                "</td><td>" +
                esc(String(b.thoughtsTokenCount)) +
                "</td><td>" +
                esc(String(b.candidatesTokenCount)) +
                "</td><td><strong>" +
                esc(String(b.totalTokenCount)) +
                "</strong></td><td>" +
                esc(String(pct)) +
                "%</td></tr>";
            }
          });
          var crossRows = "";
          if (rep.usageLogCrossCheck && rep.usageLogCrossCheck.length) {
            rep.usageLogCrossCheck.forEach(function (u) {
              crossRows +=
                "<tr><td>" +
                esc(String(u.layerType || "")) +
                "</td><td>" +
                esc(String(u.inputTokens)) +
                "</td><td>" +
                esc(String(u.outputTokens)) +
                "</td><td>" +
                esc(effFmtCost(u.costUsd)) +
                "</td></tr>";
            });
          } else {
            crossRows =
              '<tr><td colspan="4" class="muted" style="text-align:center">لا صفوف في ai_usage_logs لهذا الـ job.</td></tr>';
          }
          var callRows = "";
          if (callsArr.length) {
            callsArr.forEach(function (c) {
              var ok = c.parseOk ? "نعم" : "لا";
              var errCell = c.parseOk ? "—" : esc(String(c.parseError || "parse_error"));
              callRows +=
                "<tr><td>" +
                esc(String(c.inspectionLogId)) +
                "</td><td>" +
                esc(String(c.layer || "")) +
                "</td><td>" +
                esc(String(c.modelName || "")) +
                "</td><td>" +
                esc(String(c.createdAt || "")) +
                "</td><td>" +
                esc(String(c.promptTokenCount)) +
                "</td><td>" +
                esc(String(c.thoughtsTokenCount)) +
                "</td><td>" +
                esc(String(c.candidatesTokenCount)) +
                "</td><td><strong>" +
                esc(String(c.totalTokenCount)) +
                "</strong></td><td>" +
                esc(ok) +
                "</td><td>" +
                errCell +
                "</td></tr>";
            });
          } else {
            callRows =
              '<tr><td colspan="10" class="muted" style="text-align:center">لا توجد صفوف نداءات (لا سجلات inspection).</td></tr>';
          }
          var notesLi = (Array.isArray(rep.notes) ? rep.notes : []).map(function (n) {
            return "<li>" + esc(String(n)) + "</li>";
          }).join("");
          if (!notesLi) notesLi = "<li class=\"muted\">—</li>";
          var jsonRaw = esc(JSON.stringify(rep, null, 2));
          inner.innerHTML =
            '<div class="eff-meta-bar">' +
            "<div><strong>jobId:</strong> " +
            esc(String(rep.jobId)) +
            " &nbsp;|&nbsp; <strong>generatedAt:</strong> " +
            esc(String(rep.generatedAt || "")) +
            "</div>" +
            '<div style="margin-top:0.35rem"><strong>dataSource:</strong> <code>' +
            esc(String(rep.dataSource || "")) +
            "</code></div></div>" +
            '<div class="eff-kpi-grid">' +
            '<div class="eff-kpi-card"><b>' +
            esc(String(t.totalTokenCount != null ? t.totalTokenCount : 0)) +
            '</b><span>إجمالي totalTokenCount</span></div>' +
            '<div class="eff-kpi-card"><b>' +
            esc(thShare) +
            '</b><span>نسبة thoughts من الإجمالي</span></div>' +
            '<div class="eff-kpi-card"><b>' +
            esc(String(dom)) +
            '</b><span>أعلى طبقة حسب total</span></div>' +
            '<div class="eff-kpi-card"><b>' +
            esc(String(callsArr.length)) +
            '</b><span>عدد نداءات الفحص</span></div></div>' +
            missHtml +
            '<div class="eff-summary">ملخص سريع: أعلى طبقة <strong>' +
            esc(String(dom)) +
            "</strong> — التفكير <strong>" +
            esc(thShare) +
            "</strong> من إجمالي التوكن.</div>" +
            '<h3 class="eff-block-title">تجميع حسب الطبقة (usageMetadata)</h3>' +
            '<table class="eff-table"><thead><tr><th>طبقة</th><th>prompt</th><th>thoughts</th><th>candidates</th><th>total</th><th>% من job</th></tr></thead><tbody>' +
            layerRows +
            '<tr class="eff-totals-row"><td>الإجمالي</td><td>' +
            esc(String(t.promptTokenCount != null ? t.promptTokenCount : 0)) +
            "</td><td>" +
            esc(String(t.thoughtsTokenCount != null ? t.thoughtsTokenCount : 0)) +
            "</td><td>" +
            esc(String(t.candidatesTokenCount != null ? t.candidatesTokenCount : 0)) +
            "</td><td>" +
            esc(String(t.totalTokenCount != null ? t.totalTokenCount : 0)) +
            '</td><td>100%</td></tr></tbody></table>' +
            '<h3 class="eff-block-title">مطابقة ai_usage_logs (فوترة)</h3>' +
            '<table class="eff-table eff-subtable"><thead><tr><th>layer_type</th><th>input_tokens</th><th>output_tokens</th><th>cost_usd</th></tr></thead><tbody>' +
            crossRows +
            "</tbody></table>" +
            '<h3 class="eff-block-title">نداءات الفحص (كل صف inspection)</h3>' +
            '<div class="eff-calls-scroll"><table class="eff-table eff-subtable"><thead><tr><th>id</th><th>layer</th><th>model</th><th>createdAt</th><th>prompt</th><th>thoughts</th><th>candidates</th><th>total</th><th>parseOk</th><th>parseError</th></tr></thead><tbody>' +
            callRows +
            "</tbody></table></div>" +
            '<h3 class="eff-block-title">ملاحظات التقرير</h3>' +
            '<ul class="eff-notes">' +
            notesLi +
            "</ul>" +
            '<details class="eff-details"><summary>عرض JSON كامل</summary><pre class="code eff-json-pre">' +
            jsonRaw +
            "</pre></details>" +
            '<div class="eff-foot">الأرقام التفصيلية من <code>usageMetadata</code> في استجابة المزود المحفوظة في <code>ai_factory_inspection_logs</code>.</div>';
        }
        function renderFinalOutput(finalOutput) {
          var meta = document.getElementById("final-output-meta");
          var pre = document.getElementById("final-output-json");
          var btn = document.getElementById("preview-final-btn");
          finalItems = Array.isArray(finalOutput) ? finalOutput : [];
          finalIndex = 0;
          if (!finalItems.length) {
            meta.textContent = "لا يوجد مخرج نهائي بعد (قد يكون الـ job فشل أو لم يكتمل).";
            pre.textContent = "";
            btn.disabled = true;
            document.getElementById("final-preview-shell").hidden = true;
            return;
          }
          var p = syntaxHighlightJson(JSON.stringify(finalItems));
          pre.innerHTML = p.html;
          meta.textContent = "تم العثور على " + String(finalItems.length) + " سؤالًا نهائيًا.";
          btn.disabled = false;
          renderFinalPreview();
        }
        function renderFinalPreview() {
          var phone = document.getElementById("final-preview-phone");
          var prev = document.getElementById("final-prev-btn");
          var next = document.getElementById("final-next-btn");
          if (!finalItems.length) {
            phone.innerHTML = '<div class="preview-empty">لا توجد بيانات للمعاينة.</div>';
            prev.disabled = true;
            next.disabled = true;
            return;
          }
          if (finalIndex < 0) finalIndex = 0;
          if (finalIndex >= finalItems.length) finalIndex = finalItems.length - 1;
          var item = finalItems[finalIndex] || {};
          var options = Array.isArray(item.options) ? item.options : [];
          var correctIndex = Number(item.correctIndex);
          var optsHtml = options.map(function (opt, i) {
            var cls = "preview-option" + (i === correctIndex ? " correct" : "");
            return '<div class="' + cls + '">' + esc(opt) + "</div>";
          }).join("");
          var optionsClass = options.length === 2 ? "preview-options two-options" : "preview-options";
          phone.innerHTML =
            '<div class="preview-meta"><span>السؤال ' + String(finalIndex + 1) + " / " + String(finalItems.length) + '</span><span>' + esc(item.difficulty || "-") + "</span></div>" +
            '<div class="preview-prompt">' + esc(item.prompt || "") + "</div>" +
            '<div class="' + optionsClass + '">' + optsHtml + "</div>" +
            '<div class="preview-study"><b>بطاقة المذاكرة:</b><div style="margin-top:0.4rem">' + esc(item.studyBody || "") + "</div></div>";
          prev.disabled = finalIndex <= 0;
          next.disabled = finalIndex >= finalItems.length - 1;
        }
        async function loadInspection() {
          var secret = document.getElementById("admin-secret").value.trim();
          var jobId = Number(document.getElementById("job-id").value || "0");
          var msg = document.getElementById("msg");
          var effSection = document.getElementById("efficiency-section");
          var effInner = document.getElementById("efficiency-section-inner");
          msg.textContent = "";
          if (!secret) {
            effSection.hidden = true;
            msg.textContent = "أدخل Admin Secret أولاً.";
            return;
          }
          if (!Number.isInteger(jobId) || jobId < 1) {
            effSection.hidden = true;
            msg.textContent = "أدخل Job ID صحيح.";
            return;
          }
          effSection.hidden = false;
          effInner.innerHTML = '<p class="muted" style="margin:0">جاري تحميل تقرير الكفاءة…</p>';
          var hdr = { headers: { "X-Admin-Secret": secret } };
          var base = "/api/admin/ai-factory/jobs/" + jobId + "/";
          try {
            var resEff = await Promise.all([
              fetch(base + "inspection", hdr),
              fetch(base + "efficiency", hdr),
            ]);
            var inspRes = resEff[0];
            var effRes = resEff[1];
            var parsed = await Promise.all([inspRes.json(), effRes.json()]);
            var json = parsed[0];
            var effJson = parsed[1];
            renderEfficiencyReport(effRes, effJson);
            if (!inspRes.ok || !json.ok) throw new Error("read_failed");
            renderMeta(json.job || {});
            renderFlow(json.layers || []);
            renderErrorsTimeline(json.errorsTimeline || []);
            renderFinalOutput(json.finalOutput);
            msg.textContent = "تم تحميل بيانات الفحص وتقرير الكفاءة.";
          } catch {
            msg.textContent = "تعذر تحميل بيانات الفحص.";
            if (effInner.innerHTML.indexOf("جاري تحميل تقرير الكفاءة") !== -1) {
              effInner.innerHTML =
                '<p class="muted" style="margin:0">تعذر تحميل البيانات (الشبكة أو الاستجابة).</p>';
            }
            document.getElementById("flow").innerHTML = "";
            document.getElementById("job-meta").innerHTML = "";
            renderErrorsTimeline([]);
            renderFinalOutput(null);
          }
        }
        document.getElementById("load-btn").addEventListener("click", loadInspection);
        document.getElementById("back-btn").addEventListener("click", function () {
          window.location.href = "/admin";
        });
        document.getElementById("preview-final-btn").addEventListener("click", function () {
          document.getElementById("final-preview-shell").hidden = false;
          renderFinalPreview();
        });
        document.getElementById("final-close-btn").addEventListener("click", function () {
          document.getElementById("final-preview-shell").hidden = true;
        });
        document.getElementById("final-prev-btn").addEventListener("click", function () {
          if (finalIndex <= 0) return;
          finalIndex -= 1;
          renderFinalPreview();
        });
        document.getElementById("final-next-btn").addEventListener("click", function () {
          if (finalIndex >= finalItems.length - 1) return;
          finalIndex += 1;
          renderFinalPreview();
        });
        var params = new URLSearchParams(window.location.search);
        var jobIdParam = params.get("jobId");
        if (jobIdParam) {
          document.getElementById("job-id").value = jobIdParam;
        }
        document.getElementById("efficiency-section").addEventListener("click", function (ev) {
          var t = ev.target;
          if (t && t.closest && t.closest("[data-inspection-eff-json-copy]")) {
            if (!window.__afInspectionEfficiencyReport) {
              alert("لا يوجد تقرير محمّل.");
              return;
            }
            var txt = JSON.stringify(window.__afInspectionEfficiencyReport, null, 2);
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(txt).then(function () {
                alert("تم نسخ تقرير الكفاءة (JSON).");
              });
            } else {
              prompt("انسخ JSON:", txt);
            }
            return;
          }
          if (t && t.closest && t.closest("[data-eff-scroll-to-flow]")) {
            document.getElementById("flow").scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      })();
    </script>
  </body>
</html>
