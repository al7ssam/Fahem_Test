<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Inspection Dashboard</title>
    <style>
      :root {
        --bg: #070b16;
        --card: #11182b;
        --line: rgba(223, 187, 106, 0.24);
        --text: #f4e4bf;
        --muted: #c5b48f;
        --accent: #dfbb6a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at top, #1a2341 0%, var(--bg) 58%);
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      }
      .wrap {
        max-width: 1150px;
        margin: 0 auto;
        padding: 1rem;
      }
      .card {
        background: linear-gradient(to bottom, #10172a, #0e1425);
        border: 1px solid var(--line);
        border-radius: 0.9rem;
        padding: 0.85rem;
        margin-bottom: 0.8rem;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 12rem auto auto;
        gap: 0.6rem;
        align-items: end;
      }
      @media (max-width: 880px) {
        .toolbar { grid-template-columns: 1fr; }
      }
      label { display: block; margin-bottom: 0.25rem; color: var(--muted); }
      input, button {
        width: 100%;
        background: #0b1222;
        border: 1px solid rgba(223, 187, 106, 0.28);
        color: var(--text);
        border-radius: 0.65rem;
        padding: 0.55rem 0.7rem;
      }
      button { cursor: pointer; font-weight: 700; }
      button:hover { border-color: rgba(223, 187, 106, 0.55); }
      .meta {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.6rem;
      }
      @media (max-width: 880px) {
        .meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .kv { padding: 0.5rem; border: 1px solid rgba(223, 187, 106, 0.18); border-radius: 0.65rem; }
      .kv b { color: var(--accent); }
      .flow {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      .layer-title {
        margin: 0 0 0.45rem;
        color: var(--accent);
        font-weight: 800;
      }
      .section-title {
        margin: 0.5rem 0 0.25rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
      pre.code {
        direction: ltr;
        text-align: left;
        background: #060b16;
        border: 1px solid rgba(223, 187, 106, 0.18);
        border-radius: 0.6rem;
        padding: 0.65rem;
        overflow: auto;
        max-height: 22rem;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.35;
        font-size: 0.82rem;
      }
      .json-key { color: #f7c96f; }
      .json-string { color: #a6e3a1; }
      .json-number { color: #89dceb; }
      .json-bool { color: #f38ba8; }
      .json-null { color: #cba6f7; }
      .msg { margin-top: 0.45rem; min-height: 1.2rem; }
      .muted { color: var(--muted); }
      .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
      .preview-shell {
        margin-top: 0.7rem;
        border: 1px solid rgba(223, 187, 106, 0.2);
        border-radius: 0.8rem;
        padding: 0.75rem;
        background: rgba(8, 12, 24, 0.86);
      }
      .preview-phone {
        border: 1px solid rgba(223, 187, 106, 0.2);
        border-radius: 0.75rem;
        background: rgba(25, 31, 57, 0.82);
        padding: 0.7rem;
      }
      .preview-meta {
        display: flex;
        justify-content: space-between;
        color: #dbc89f;
        margin-bottom: 0.45rem;
        font-size: 0.84rem;
      }
      .preview-prompt { font-size: 1rem; font-weight: 700; margin-bottom: 0.55rem; }
      .preview-options { display: grid; grid-template-columns: 1fr; gap: 0.45rem; margin-bottom: 0.6rem; }
      .preview-options.two-options { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .preview-option { border: 1px solid rgba(223, 187, 106, 0.23); border-radius: 0.6rem; padding: 0.48rem; background: rgba(17, 24, 39, 0.85); }
      .preview-option.correct { border-color: rgba(52, 211, 153, 0.75); background: rgba(6, 78, 59, 0.35); }
      .preview-study { border: 1px solid rgba(223, 187, 106, 0.18); border-radius: 0.6rem; padding: 0.58rem; background: rgba(10, 14, 27, 0.85); }
      .preview-empty { color: #c9ba97; text-align: center; font-size: 0.9rem; padding: 1.1rem 0.3rem; }
      .error-timeline-list {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.45rem;
      }
      .error-item {
        border: 1px solid rgba(248, 113, 113, 0.35);
        background: rgba(127, 29, 29, 0.2);
        border-radius: 0.6rem;
        padding: 0.55rem;
      }
      .error-item b { color: #fca5a5; }
      .error-details {
        margin-top: 0.35rem;
        font-size: 0.82rem;
        white-space: pre-wrap;
        color: #f9d9d9;
      }
      .eff-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.45rem;
      }
      .eff-summary {
        font-size: 0.88rem;
        opacity: 0.92;
        margin-bottom: 0.4rem;
      }
      .eff-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.84rem;
        margin-bottom: 0.4rem;
        direction: ltr;
        text-align: center;
      }
      .eff-table th,
      .eff-table td {
        border: 1px solid rgba(223, 187, 106, 0.22);
        padding: 0.38rem 0.28rem;
      }
      .eff-table th:first-child,
      .eff-table td:first-child {
        text-align: right;
        direction: rtl;
      }
      .eff-table tbody tr:last-child td {
        font-weight: 800;
        border-top: 1px solid rgba(223, 187, 106, 0.32);
      }
      .eff-foot {
        font-size: 0.78rem;
        opacity: 0.78;
        line-height: 1.45;
      }
      button.eff-copy-btn {
        width: auto;
        padding: 0.4rem 0.75rem;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 style="margin:0 0 0.45rem">AI Inspection Dashboard</h2>
        <div class="muted">إجمالي الأسئلة: {{QUESTION_COUNT}}</div>
      </div>

      <div class="card toolbar">
        <div>
          <label for="admin-secret">Admin Secret</label>
          <input id="admin-secret" type="password" placeholder="أدخل مفتاح الأدمن" />
        </div>
        <div>
          <label for="job-id">Job ID</label>
          <input id="job-id" type="number" min="1" placeholder="مثال: 12" />
        </div>
        <div>
          <button id="load-btn" type="button">تحميل الفحص</button>
        </div>
        <div>
          <button id="back-btn" type="button">العودة للأدمن</button>
        </div>
      </div>

      <div class="card">
        <div id="job-meta" class="meta"></div>
        <div id="msg" class="msg"></div>
      </div>

      <div id="efficiency-card" class="card" hidden>
        <h3 class="layer-title" style="margin-bottom: 0.35rem">تقرير كفاءة الاستهلاك</h3>
        <div id="efficiency-card-inner" class="muted">—</div>
      </div>

      <div id="flow" class="flow"></div>

      <div class="card">
        <h3 class="layer-title" style="margin-bottom:0.35rem">تسلسل الأخطاء</h3>
        <div class="muted" id="errors-meta">لا توجد أخطاء.</div>
        <div id="errors-timeline" class="error-timeline-list"></div>
      </div>

      <div class="card">
        <h3 class="layer-title" style="margin-bottom:0.35rem">المخرج النهائي (Normalized JSON)</h3>
        <div class="muted" id="final-output-meta">لا يوجد مخرج نهائي بعد.</div>
        <div class="btn-row">
          <button id="preview-final-btn" type="button" disabled>عرض الأسئلة</button>
        </div>
        <div style="margin-top:0.55rem">
          <pre id="final-output-json" class="code"></pre>
        </div>

        <div class="preview-shell" id="final-preview-shell" hidden>
          <div class="preview-phone" id="final-preview-phone">
            <div class="preview-empty">لا توجد بيانات للمعاينة.</div>
          </div>
          <div class="btn-row">
            <button type="button" id="final-prev-btn">السابق</button>
            <button type="button" id="final-next-btn">التالي</button>
            <button type="button" id="final-close-btn">إغلاق المعاينة</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var finalItems = [];
        var finalIndex = 0;
        function esc(s) {
          return String(s ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }
        function syntaxHighlightJson(text) {
          try {
            var obj = JSON.parse(String(text || ""));
            var pretty = JSON.stringify(obj, null, 2);
            var html = esc(pretty)
              .replace(/\"([^\"\\]*(?:\\.[^\"\\]*)*)\"(?=\\s*:)/g, '<span class="json-key">"$1"</span>')
              .replace(/\"([^\"\\]*(?:\\.[^\"\\]*)*)\"/g, '<span class="json-string">"$1"</span>')
              .replace(/\b-?\d+(?:\.\d+)?\b/g, '<span class="json-number">$&</span>')
              .replace(/\b(true|false)\b/g, '<span class="json-bool">$1</span>')
              .replace(/\bnull\b/g, '<span class="json-null">null</span>');
            return { html: html, isJson: true };
          } catch {
            return { html: esc(String(text || "")), isJson: false };
          }
        }
        function renderMeta(job) {
          var box = document.getElementById("job-meta");
          box.innerHTML = "";
          var fields = [
            ["Job", "#" + job.id],
            ["الحالة", job.status],
            ["الطبقة الحالية", job.currentLayer || "-"],
            ["subcategory", job.subcategoryKey],
            ["محاولات", String(job.attemptCount) + " / " + String(job.maxAttempts)],
            ["created", job.createdAt || "-"],
            ["started", job.startedAt || "-"],
            ["finished", job.finishedAt || "-"],
            ["lastError", job.lastError || "-"],
            ["difficulty", job.difficultyMode || "-"],
          ];
          fields.forEach(function (f) {
            var el = document.createElement("div");
            el.className = "kv";
            el.innerHTML = "<b>" + esc(f[0]) + ":</b> " + esc(f[1]);
            box.appendChild(el);
          });
        }
        function renderFlow(items) {
          var flow = document.getElementById("flow");
          flow.innerHTML = "";
          if (!items || !items.length) {
            flow.innerHTML = '<div class="card muted">لا توجد بيانات inspection لهذا الـ job بعد.</div>';
            return;
          }
          items.forEach(function (row, idx) {
            var card = document.createElement("div");
            card.className = "card";
            var p = syntaxHighlightJson(row.promptText || "");
            var r = syntaxHighlightJson(row.rawResponseText || "");
            card.innerHTML =
              '<h3 class="layer-title">[' + esc(String(idx + 1)) + "] " + esc(row.layerName || "-") + "</h3>" +
              '<div class="muted">model: ' + esc(row.modelName || "-") + " | provider: " + esc(row.provider || "-") + " | api: " + esc(row.apiVersion || "-") + " | at: " + esc(row.createdAt || "-") + "</div>" +
              '<div class="section-title">Prompt</div>' +
              '<pre class="code">' + p.html + "</pre>" +
              '<div class="section-title">Raw Response' + (r.isJson ? " (JSON)" : "") + "</div>" +
              '<pre class="code">' + r.html + "</pre>";
            flow.appendChild(card);
          });
        }
        function renderErrorsTimeline(items) {
          var meta = document.getElementById("errors-meta");
          var box = document.getElementById("errors-timeline");
          box.innerHTML = "";
          if (!items || !items.length) {
            meta.textContent = "لا توجد أخطاء لهذا الـjob.";
            return;
          }
          meta.textContent = "عدد الأخطاء: " + String(items.length) + " (مرتبة زمنيًا).";
          items.forEach(function (e, idx) {
            var row = document.createElement("div");
            row.className = "error-item";
            var detailsText = "";
            if (e.details && typeof e.details === "object" && e.details.error) {
              detailsText = String(e.details.error);
            } else if (e.details) {
              detailsText = JSON.stringify(e.details);
            }
            row.innerHTML =
              "<div><b>#" + String(idx + 1) + "</b> | " + esc(e.createdAt || "-") + " | layer: " + esc(e.layerName || "-") + "</div>" +
              "<div style='margin-top:0.25rem'>" + esc(e.message || "-") + "</div>" +
              (detailsText ? "<div class='error-details'>" + esc(detailsText) + "</div>" : "");
            box.appendChild(row);
          });
        }
        function renderEfficiencyReport(effRes, effJson) {
          var inner = document.getElementById("efficiency-card-inner");
          if (!effRes.ok || !effJson.ok || !effJson.report) {
            window.__afInspectionEfficiencyReport = null;
            inner.innerHTML =
              '<p class="muted" style="margin:0">تعذر تحميل تقرير الكفاءة لهذا الـ job.</p>';
            return;
          }
          var rep = effJson.report;
          window.__afInspectionEfficiencyReport = rep;
          var t = rep.totals;
          var dom = rep.indicators.dominantLayerByTotal || "—";
          var thShare =
            rep.indicators.thoughtsShareOfTotal != null
              ? Math.round(rep.indicators.thoughtsShareOfTotal * 100) + "%"
              : "—";
          var layerRows = "";
          ["architect", "creator", "auditor", "refiner"].forEach(function (layer) {
            var b = rep.byLayer && rep.byLayer[layer];
            var pct =
              (rep.indicators.layerShareOfTotalTokensPercent &&
                rep.indicators.layerShareOfTotalTokensPercent[layer]) ||
              0;
            if (!b || b.callCount === 0) {
              layerRows +=
                "<tr><td>" +
                esc(layer) +
                "</td><td colspan=\"5\" style=\"opacity:0.72\">— لا يوجد استدعاء مسجل</td></tr>";
            } else {
              layerRows +=
                "<tr><td>" +
                esc(layer) +
                "</td><td>" +
                esc(String(b.promptTokenCount)) +
                "</td><td>" +
                esc(String(b.thoughtsTokenCount)) +
                "</td><td>" +
                esc(String(b.candidatesTokenCount)) +
                "</td><td><strong>" +
                esc(String(b.totalTokenCount)) +
                "</strong></td><td>" +
                esc(String(pct)) +
                "%</td></tr>";
            }
          });
          var uchk =
            rep.usageLogCrossCheck && rep.usageLogCrossCheck.length
              ? rep.usageLogCrossCheck
                  .map(function (u) {
                    return esc(String(u.layerType || "")) + " in/out=" + esc(String(u.inputTokens)) + "/" + esc(String(u.outputTokens));
                  })
                  .join(" | ")
              : "لا صفوف";
          inner.innerHTML =
            '<div class="eff-toolbar">' +
            '<button type="button" class="eff-copy-btn" data-inspection-eff-json-copy>نسخ JSON</button>' +
            "</div>" +
            '<div class="eff-summary">أعلى طبقة حسب total: <strong>' +
            esc(dom) +
            "</strong> — نسبة التفكير من الإجمالي: <strong>" +
            esc(thShare) +
            "</strong></div>" +
            '<table class="eff-table"><thead><tr><th>طبقة</th><th>prompt</th><th>thoughts</th><th>candidates</th><th>total</th><th>% من job</th></tr></thead><tbody>' +
            layerRows +
            "<tr><td>الإجمالي</td><td>" +
            esc(String(t.promptTokenCount)) +
            "</td><td>" +
            esc(String(t.thoughtsTokenCount)) +
            "</td><td>" +
            esc(String(t.candidatesTokenCount)) +
            "</td><td>" +
            esc(String(t.totalTokenCount)) +
            '</td><td>100%</td></tr></tbody></table>' +
            '<div class="eff-foot">المصدر: <code>usageMetadata</code> من سجلات الفحص. مطابقة الفوترة: ' +
            uchk +
            "</div>";
          var copyBtn = inner.querySelector("[data-inspection-eff-json-copy]");
          if (copyBtn) {
            copyBtn.addEventListener("click", function () {
              var txt = JSON.stringify(window.__afInspectionEfficiencyReport, null, 2);
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(txt).then(function () {
                  alert("تم نسخ تقرير الكفاءة (JSON).");
                });
              } else {
                prompt("انسخ JSON:", txt);
              }
            });
          }
        }
        function renderFinalOutput(finalOutput) {
          var meta = document.getElementById("final-output-meta");
          var pre = document.getElementById("final-output-json");
          var btn = document.getElementById("preview-final-btn");
          finalItems = Array.isArray(finalOutput) ? finalOutput : [];
          finalIndex = 0;
          if (!finalItems.length) {
            meta.textContent = "لا يوجد مخرج نهائي بعد (قد يكون الـ job فشل أو لم يكتمل).";
            pre.textContent = "";
            btn.disabled = true;
            document.getElementById("final-preview-shell").hidden = true;
            return;
          }
          var p = syntaxHighlightJson(JSON.stringify(finalItems));
          pre.innerHTML = p.html;
          meta.textContent = "تم العثور على " + String(finalItems.length) + " سؤالًا نهائيًا.";
          btn.disabled = false;
          renderFinalPreview();
        }
        function renderFinalPreview() {
          var phone = document.getElementById("final-preview-phone");
          var prev = document.getElementById("final-prev-btn");
          var next = document.getElementById("final-next-btn");
          if (!finalItems.length) {
            phone.innerHTML = '<div class="preview-empty">لا توجد بيانات للمعاينة.</div>';
            prev.disabled = true;
            next.disabled = true;
            return;
          }
          if (finalIndex < 0) finalIndex = 0;
          if (finalIndex >= finalItems.length) finalIndex = finalItems.length - 1;
          var item = finalItems[finalIndex] || {};
          var options = Array.isArray(item.options) ? item.options : [];
          var correctIndex = Number(item.correctIndex);
          var optsHtml = options.map(function (opt, i) {
            var cls = "preview-option" + (i === correctIndex ? " correct" : "");
            return '<div class="' + cls + '">' + esc(opt) + "</div>";
          }).join("");
          var optionsClass = options.length === 2 ? "preview-options two-options" : "preview-options";
          phone.innerHTML =
            '<div class="preview-meta"><span>السؤال ' + String(finalIndex + 1) + " / " + String(finalItems.length) + '</span><span>' + esc(item.difficulty || "-") + "</span></div>" +
            '<div class="preview-prompt">' + esc(item.prompt || "") + "</div>" +
            '<div class="' + optionsClass + '">' + optsHtml + "</div>" +
            '<div class="preview-study"><b>بطاقة المذاكرة:</b><div style="margin-top:0.4rem">' + esc(item.studyBody || "") + "</div></div>";
          prev.disabled = finalIndex <= 0;
          next.disabled = finalIndex >= finalItems.length - 1;
        }
        async function loadInspection() {
          var secret = document.getElementById("admin-secret").value.trim();
          var jobId = Number(document.getElementById("job-id").value || "0");
          var msg = document.getElementById("msg");
          var effCard = document.getElementById("efficiency-card");
          var effInner = document.getElementById("efficiency-card-inner");
          msg.textContent = "";
          if (!secret) {
            effCard.hidden = true;
            msg.textContent = "أدخل Admin Secret أولاً.";
            return;
          }
          if (!Number.isInteger(jobId) || jobId < 1) {
            effCard.hidden = true;
            msg.textContent = "أدخل Job ID صحيح.";
            return;
          }
          effCard.hidden = false;
          effInner.innerHTML = '<p class="muted" style="margin:0">جاري تحميل تقرير الكفاءة…</p>';
          var hdr = { headers: { "X-Admin-Secret": secret } };
          var base = "/api/admin/ai-factory/jobs/" + jobId + "/";
          try {
            var resEff = await Promise.all([
              fetch(base + "inspection", hdr),
              fetch(base + "efficiency", hdr),
            ]);
            var inspRes = resEff[0];
            var effRes = resEff[1];
            var parsed = await Promise.all([inspRes.json(), effRes.json()]);
            var json = parsed[0];
            var effJson = parsed[1];
            renderEfficiencyReport(effRes, effJson);
            if (!inspRes.ok || !json.ok) throw new Error("read_failed");
            renderMeta(json.job || {});
            renderFlow(json.layers || []);
            renderErrorsTimeline(json.errorsTimeline || []);
            renderFinalOutput(json.finalOutput);
            msg.textContent = "تم تحميل بيانات الفحص وتقرير الكفاءة.";
          } catch {
            msg.textContent = "تعذر تحميل بيانات الفحص.";
            if (effInner.innerHTML.indexOf("جاري تحميل تقرير الكفاءة") !== -1) {
              effInner.innerHTML =
                '<p class="muted" style="margin:0">تعذر تحميل البيانات (الشبكة أو الاستجابة).</p>';
            }
            document.getElementById("flow").innerHTML = "";
            document.getElementById("job-meta").innerHTML = "";
            renderErrorsTimeline([]);
            renderFinalOutput(null);
          }
        }
        document.getElementById("load-btn").addEventListener("click", loadInspection);
        document.getElementById("back-btn").addEventListener("click", function () {
          window.location.href = "/admin";
        });
        document.getElementById("preview-final-btn").addEventListener("click", function () {
          document.getElementById("final-preview-shell").hidden = false;
          renderFinalPreview();
        });
        document.getElementById("final-close-btn").addEventListener("click", function () {
          document.getElementById("final-preview-shell").hidden = true;
        });
        document.getElementById("final-prev-btn").addEventListener("click", function () {
          if (finalIndex <= 0) return;
          finalIndex -= 1;
          renderFinalPreview();
        });
        document.getElementById("final-next-btn").addEventListener("click", function () {
          if (finalIndex >= finalItems.length - 1) return;
          finalIndex += 1;
          renderFinalPreview();
        });
        var params = new URLSearchParams(window.location.search);
        var jobIdParam = params.get("jobId");
        if (jobIdParam) {
          document.getElementById("job-id").value = jobIdParam;
        }
      })();
    </script>
  </body>
</html>
